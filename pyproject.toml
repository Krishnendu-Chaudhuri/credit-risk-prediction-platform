[tool.pytest.ini_options]
pythonpath = ["."]
markers = [
    "slow: full batch-limit inference tests (run with pytest -m slow)",
]

[tool.coverage.run]
source = ["src", "app/api"]
omit = [
    "app/streamlit/*",
]

[tool.coverage.report]
fail_under = 76
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src", "app", "tests", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501", "E402", "E741"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = true
disallow_untyped_defs = false
check_untyped_defs = true
exclude = ["docs/", "notebooks/"]
